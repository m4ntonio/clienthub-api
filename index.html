<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ClientHub</title>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

.container {
    width: 500px;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 5px;
}

.btn-main {
    width: 100%;
    background: #6c5ce7;
    color: white;
}

.btn-delete {
    background: #ff4757;
    color: white;
}

.btn-edit {
    background: #ffa502;
    color: white;
}

.cliente {
    background: #f1f2f6;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
    <h2>ClientHub</h2>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="telefone" placeholder="Telefone">
    <input id="endereco" placeholder="Endereço">

    <button class="btn-main" onclick="salvar()">Salvar</button>

    <div id="lista"></div>
</div>

<script>
const API = "http://127.0.0.1:8000/clientes";

let editId = null;

// 🔥 salvar (create ou update)
async function salvar() {
    const data = {
        nome: nome.value,
        email: email.value,
        telefone: telefone.value,
        endereco: endereco.value
    };

    if (editId) {
        await fetch(`${API}/${editId}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });
        editId = null;
    } else {
        await fetch(API, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });
    }

    limpar();
    carregar();
}

// 🔥 listar
async function carregar() {
    const res = await fetch(API);
    const clientes = await res.json();

    lista.innerHTML = "";

    clientes.forEach(c => {
        lista.innerHTML += `
        <div class="cliente">
            <b>${c.nome}</b><br>
            ${c.email}<br>
            ${c.telefone}<br>

            <button class="btn-edit" onclick='editar(${JSON.stringify(c)})'>Editar</button>
            <button class="btn-delete" onclick="deletar('${c.id}')">Excluir</button>
        </div>`;
    });
}

// 🔥 deletar
async function deletar(id) {
    await fetch(`${API}/${id}`, { method: "DELETE" });
    carregar();
}

// 🔥 editar
function editar(c) {
    nome.value = c.nome;
    email.value = c.email;
    telefone.value = c.telefone;
    endereco.value = c.endereco;

    editId = c.id;
}

// 🔥 limpar form
function limpar() {
    nome.value = "";
    email.value = "";
    telefone.value = "";
    endereco.value = "";
}

// carregar ao abrir
carregar();
</script>

</body>
</html>
